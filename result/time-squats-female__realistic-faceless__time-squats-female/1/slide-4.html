<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Slide 4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="slide slide--ig">
    <img class="bg" src="assets/slide-4.png" alt="" />
    <div class="overlay overlay--flat"></div>
    <section class="copy copy--center">
      <span class="kicker">your week</span>
      <div class="stat-num">247</div>
      <p class="stat-label">squats this week.<br/><span class="mute">earned 1h 12m back.</span></p>
    </section>
    <footer class="brand">
      <span class="dot"></span>
      <span>time squats — ios</span>
    </footer>
  </main>
</body>
</html>

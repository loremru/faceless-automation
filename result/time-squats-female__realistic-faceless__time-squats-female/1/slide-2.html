<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Slide 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="slide slide--ig">
    <img class="bg" src="assets/slide-2.png" alt="" />
    <div class="overlay overlay--top"></div>
    <section class="copy copy--top">
      <span class="kicker">today</span>
      <h1 class="headline headline--md">
        you opened it<br/>
        <span class="emph">47</span> times.
      </h1>
      <p class="sub">your thumb already knows the way.</p>
    </section>
    <footer class="brand">
      <span class="dot"></span>
      <span>time squats — ios</span>
    </footer>
  </main>
</body>
</html>
